name: PIMS-MS Enterprise Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  ci-build-test:
    name: 🏗️ Build & Test
    runs-on: ubuntu-latest

    steps:
    - name: 🛒 Checkout Repository
      uses: actions/checkout@v4

    - name: ⚙️ Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: 📦 Restore Dependencies
      run: dotnet restore

    - name: 🛠️ Build Solution
      run: dotnet build --configuration Release --no-restore

    - name: 🧪 Run Tests (Unit & Integration)
      run: dotnet test --configuration Release --no-build --verbosity normal --logger trx --results-directory "TestResults"

    - name: 📊 Upload Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: TestResults

  cd-deploy-staging:
    name: 🚀 Deploy to Staging
    needs: ci-build-test
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: Staging

    steps:
      - name: 📥 Download Artifacts (Simulado)
        run: echo "Aquí descargarías tu código compilado o imagen Docker."
        
      - name: ☁️ Deploy to Dev Server
        run: echo "Aquí colocas el comando para subir a Azure App Service, AWS o tu VPS Linux."

  cd-deploy-prod:
    name: 👑 Deploy to Production
    needs: ci-build-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: Production

    steps:
      - name: 🔒 Zero-Downtime Deployment
        run: echo "Desplegando MS-IMS a Producción..."
